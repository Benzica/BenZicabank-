<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - To-Do List Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .input-section {
            padding: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .input-group button:hover {
            transform: translateY(-2px);
        }

        .input-group button:active {
            transform: translateY(0);
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 20px 15px;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .tasks-section {
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
        }

        .tasks-section::-webkit-scrollbar {
            width: 6px;
        }

        .tasks-section::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .tasks-section::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .task-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .task-item.completed {
            background: #f0f0f0;
            opacity: 0.7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin-top: 2px;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-size: 1rem;
            margin-bottom: 5px;
            word-break: break-word;
            color: #333;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #999;
        }

        .task-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .priority-high {
            background: #ffebee;
            color: #c62828;
        }

        .priority-medium {
            background: #fff3e0;
            color: #e65100;
        }

        .priority-low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .task-category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            background: #e3f2fd;
            color: #1565c0;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #666;
        }

        .task-btn:hover {
            background: #e0e0e0;
        }

        .task-btn.delete:hover {
            background: #ffebee;
            color: #c62828;
        }

        .task-btn.edit:hover {
            background: #e3f2fd;
            color: #1565c0;
        }

        .footer {
            background: #f9f9f9;
            padding: 15px 20px;
            border-top: 2px solid #f0f0f0;
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .footer-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .footer-btn:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
            margin-bottom: 5px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
        }

        .modal-footer button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-footer .btn-primary {
            background: #667eea;
            color: white;
        }

        .modal-footer .btn-primary:hover {
            background: #764ba2;
        }

        .modal-footer .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .modal-footer .btn-secondary:hover {
            background: #d0d0d0;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #c8e6c9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .alert-warning {
            background: #ffe0b2;
            color: #e65100;
            border-left: 4px solid #e65100;
        }

        .alert-error {
            background: #ffcdd2;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .stats {
                flex-wrap: wrap;
                gap: 10px;
            }

            .input-group {
                flex-direction: column;
            }

            .task-meta {
                flex-wrap: wrap;
            }

            .footer {
                flex-direction: column;
                gap: 10px;
            }

            .modal-content {
                position: relative;
            }

            .close-modal {
                position: absolute;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-tasks"></i> TaskMaster
            </h1>
            <p>Stay organized and productive</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div id="alert" class="alert"></div>
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button onclick="app.addTask()" id="addBtn">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div class="filters">
                <button class="filter-btn active" onclick="app.setFilter('all')">
                    <i class="fas fa-list"></i> All
                </button>
                <button class="filter-btn" onclick="app.setFilter('pending')">
                    <i class="fas fa-clock"></i> Pending
                </button>
                <button class="filter-btn" onclick="app.setFilter('completed')">
                    <i class="fas fa-check-circle"></i> Completed
                </button>
                <button class="filter-btn" onclick="app.setFilter('high')">
                    <i class="fas fa-exclamation-circle"></i> High Priority
                </button>
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="tasks-section" id="tasksList">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <button class="footer-btn" onclick="app.openAdvancedModal()">
                <i class="fas fa-plus-circle"></i> Add Advanced
            </button>
            <button class="footer-btn" onclick="app.exportTasks()">
                <i class="fas fa-download"></i> Export
            </button>
            <button class="footer-btn" onclick="app.clearCompleted()">
                <i class="fas fa-trash"></i> Clear Completed
            </button>
        </div>
    </div>

    <!-- Advanced Add Modal -->
    <div id="advancedModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="app.closeAdvancedModal()">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2>Add Advanced Task</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Task Title *</label>
                    <input type="text" id="advancedTitle" placeholder="What do you need to do?">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="advancedDescription" placeholder="Add more details..."></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="advancedPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="advancedCategory">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="advancedDueDate">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="app.addAdvancedTask()">
                    <i class="fas fa-check"></i> Create Task
                </button>
                <button class="btn-secondary" onclick="app.closeAdvancedModal()">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="app.closeEditModal()">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2>Edit Task</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Task Title *</label>
                    <input type="text" id="editTitle" placeholder="What do you need to do?">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" placeholder="Add more details..."></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="editPriority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="editCategory">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="editDueDate">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="app.saveEditedTask()">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <button class="btn-secondary" onclick="app.closeEditModal()">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        // Task Manager Application
        const app = {
            tasks: [],
            currentFilter: 'all',
            editingId: null,

            // Initialize app
            init() {
                this.loadTasks();
                this.renderTasks();
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });
                this.updateStats();
            },

            // Save tasks to localStorage
            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            },

            // Load tasks from localStorage
            loadTasks() {
                const saved = localStorage.getItem('tasks');
                this.tasks = saved ? JSON.parse(saved) : [];
            },

            // Add a simple task
            addTask() {
                const input = document.getElementById('taskInput');
                const text = input.value.trim();

                if (!text) {
                    this.showAlert('Please enter a task!', 'warning');
                    return;
                }

                if (text.length > 200) {
                    this.showAlert('Task is too long (max 200 characters)', 'warning');
                    return;
                }

                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString(),
                    priority: 'medium',
                    category: 'other',
                    description: '',
                    dueDate: null
                };

                this.tasks.unshift(task);
                this.saveTasks();
                input.value = '';
                this.renderTasks();
                this.updateStats();
                this.showAlert('Task added successfully!', 'success');
            },

            // Add advanced task
            addAdvancedTask() {
                const title = document.getElementById('advancedTitle').value.trim();
                const description = document.getElementById('advancedDescription').value.trim();
                const priority = document.getElementById('advancedPriority').value;
                const category = document.getElementById('advancedCategory').value;
                const dueDate = document.getElementById('advancedDueDate').value;

                if (!title) {
                    this.showAlert('Please enter a task title!', 'warning');
                    return;
                }

                const task = {
                    id: Date.now(),
                    text: title,
                    description: description,
                    completed: false,
                    priority: priority,
                    category: category,
                    dueDate: dueDate,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.saveTasks();
                this.closeAdvancedModal();
                this.renderTasks();
                this.updateStats();
                this.showAlert('Advanced task added!', 'success');
            },

            // Toggle task completion
            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            },

            // Delete task
            deleteTask(id) {
                if (confirm('Are you sure you want to delete this task?')) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                    this.showAlert('Task deleted!', 'success');
                }
            },

            // Open edit modal
            openEditModal(id) {
                const task = this.tasks.find(t => t.id === id);
                if (!task) return;

                this.editingId = id;
                document.getElementById('editTitle').value = task.text;
                document.getElementById('editDescription').value = task.description || '';
                document.getElementById('editPriority').value = task.priority || 'medium';
                document.getElementById('editCategory').value = task.category || 'other';
                document.getElementById('editDueDate').value = task.dueDate || '';

                document.getElementById('editModal').classList.add('active');
            },

            // Save edited task
            saveEditedTask() {
                const task = this.tasks.find(t => t.id === this.editingId);
                if (!task) return;

                const title = document.getElementById('editTitle').value.trim();
                if (!title) {
                    this.showAlert('Task title cannot be empty!', 'warning');
                    return;
                }

                task.text = title;
                task.description = document.getElementById('editDescription').value.trim();
                task.priority = document.getElementById('editPriority').value;
                task.category = document.getElementById('editCategory').value;
                task.dueDate = document.getElementById('editDueDate').value;

                this.saveTasks();
                this.closeEditModal();
                this.renderTasks();
                this.updateStats();
                this.showAlert('Task updated!', 'success');
            },

            // Close edit modal
            closeEditModal() {
                document.getElementById('editModal').classList.remove('active');
                this.editingId = null;
            },

            // Open advanced modal
            openAdvancedModal() {
                document.getElementById('advancedModal').classList.add('active');
            },

            // Close advanced modal
            closeAdvancedModal() {
                document.getElementById('advancedModal').classList.remove('active');
                document.getElementById('advancedTitle').value = '';
                document.getElementById('advancedDescription').value = '';
                document.getElementById('advancedPriority').value = 'medium';
                document.getElementById('advancedCategory').value = 'other';
                document.getElementById('advancedDueDate').value = '';
            },

            // Set filter
            setFilter(filter) {
                this.currentFilter = filter;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                this.renderTasks();
            },

            // Get filtered tasks
            getFilteredTasks() {
                let filtered = this.tasks;

                switch (this.currentFilter) {
                    case 'pending':
                        filtered = filtered.filter(t => !t.completed);
                        break;
                    case 'completed':
                        filtered = filtered.filter(t => t.completed);
                        break;
                    case 'high':
                        filtered = filtered.filter(t => t.priority === 'high');
                        break;
                }

                return filtered;
            },

            // Render tasks
            renderTasks() {
                const tasksList = document.getElementById('tasksList');
                const filtered = this.getFilteredTasks();

                if (filtered.length === 0) {
                    tasksList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>No tasks found. ${this.currentFilter !== 'all' ? 'Try changing the filter.' : 'Add one to get started!'}</p>
                        </div>
                    `;
                    return;
                }

                tasksList.innerHTML = filtered.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input 
                            type="checkbox" 
                            class="task-checkbox"
                            ${task.completed ? 'checked' : ''}
                            onchange="app.toggleTask(${task.id})"
                        >
                        <div class="task-content">
                            <div class="task-text">${this.escapeHtml(task.text)}</div>
                            <div class="task-meta">
                                ${task.priority ? `<span class="task-priority priority-${task.priority}">${task.priority.toUpperCase()}</span>` : ''}
                                ${task.category ? `<span class="task-category">${task.category}</span>` : ''}
                                <span class="task-date">
                                    <i class="fas fa-calendar"></i>
                                    ${this.formatDate(task.createdAt)}
                                </span>
                                ${task.dueDate ? `<span class="task-date"><i class="fas fa-flag"></i> Due: ${this.formatDateOnly(task.dueDate)}</span>` : ''}
                            </div>
                            ${task.description ? `<div style="margin-top: 8px; color: #666; font-size: 0.9rem;">${this.escapeHtml(task.description)}</div>` : ''}
                        </div>
                        <div class="task-actions">
                            <button class="task-btn edit" onclick="app.openEditModal(${task.id})" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="task-btn delete" onclick="app.deleteTask(${task.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            },

            // Update stats
            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            },

            // Clear completed tasks
            clearCompleted() {
                const completed = this.tasks.filter(t => t.completed).length;
                if (completed === 0) {
                    this.showAlert('No completed tasks to clear!', 'warning');
                    return;
                }

                if (confirm(`Clear ${completed} completed task(s)?`)) {
                    this.tasks = this.tasks.filter(t => !t.completed);
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                    this.showAlert('Completed tasks cleared!', 'success');
                }
            },

            // Export tasks
            exportTasks() {
                if (this.tasks.length === 0) {
                    this.showAlert('No tasks to export!', 'warning');
                    return;
                }

                const dataStr = JSON.stringify(this.tasks, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `tasks-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                this.showAlert('Tasks exported successfully!', 'success');
            },

            // Show alert
            showAlert(message, type = 'success') {
                const alert = document.getElementById('alert');
                alert.textContent = message;
                alert.className = `alert alert-${type} show`;
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 3000);
            },

            // Escape HTML
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            // Format date
            formatDate(dateString) {
                const date = new Date(dateString);
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                if (date.toDateString() === today.toDateString()) {
                    return 'Today';
                } else if (date.toDateString() === yesterday.toDateString()) {
                    return 'Yesterday';
                } else {
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                }
            },

            // Format date only
            formatDateOnly(dateString) {
                if (!dateString) return '';
                return new Date(dateString + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }
        };

        // Initialize app when page loads
        document.addEventListener('DOMContentLoaded', () => app.init());

        // Close modals when clicking outside
        window.onclick = function(event) {
            const advancedModal = document.getElementById('advancedModal');
            const editModal = document.getElementById('editModal');
            
            if (event.target === advancedModal) {
                app.closeAdvancedModal();
            }
            if (event.target === editModal) {
                app.closeEditModal();
            }
        };
    </script>
</body>
</html>
